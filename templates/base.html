<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}FileCat{% endblock %}</title>

    <!-- Favicon and Icons -->
    <link rel="icon" type="image/x-icon" href="{{ url_for('static', filename='img/favicon.ico') }}">
    <link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='img/favicon-16x16.png') }}">
    <link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='img/favicon-32x32.png') }}">
    <link rel="icon" type="image/png" sizes="48x48" href="{{ url_for('static', filename='img/favicon-48x48.png') }}">
    <link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='img/apple-touch-icon.png') }}">
    <link rel="icon" type="image/png" sizes="192x192" href="{{ url_for('static', filename='img/android-chrome-192x192.png') }}">
    <link rel="icon" type="image/png" sizes="512x512" href="{{ url_for('static', filename='img/android-chrome-512x512.png') }}">

    <!-- Stylesheet -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-brand">
                <img src="{{ url_for('static', filename='img/favicon-32x32.png') }}" alt="FileCat" width="24" height="24" style="vertical-align: middle; margin-right: 0.5rem;" onerror="this.style.display='none'">
                FileCat
            </a>
            <ul class="nav-links">
                <li><a href="/">Dashboard</a></li>
                <li><a href="/maintenance">Maintenance</a></li>
                <li><a href="/search">Search</a></li>
                <li><a href="/browse">Browse</a></li>
                <li><a href="/tags">Tags</a></li>
                <li><a href="/integrity">Integrity</a></li>
                <li><a href="/settings">Settings</a></li>
                <li>
                    <button id="themeToggle" onclick="toggleTheme()" style="background: none; border: none; cursor: pointer; font-size: 1.25rem; padding: 0.25rem;" title="Toggle Dark Mode">
                        🌙
                    </button>
                </li>
            </ul>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Dark Mode Toggle - Phase 2 Feature
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'dark' ? 'light' : 'dark';

            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);

            // Update toggle button
            const toggle = document.getElementById('themeToggle');
            toggle.textContent = newTheme === 'dark' ? '☀️' : '🌙';
        }

        // Load saved theme on page load
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const toggle = document.getElementById('themeToggle');
            if (toggle) {
                toggle.textContent = savedTheme === 'dark' ? '☀️' : '🌙';
            }
        })();
    </script>

    {% block scripts %}{% endblock %}
</body>
</html>
